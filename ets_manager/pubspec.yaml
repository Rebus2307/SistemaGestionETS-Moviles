name: ets_manager
description: Sistema para la Gestión de Exámenes a Título de Suficiencia (ETS) - ESCOM
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # UI
  flutter_svg: ^2.0.9
  google_fonts: ^6.2.1

  # Estado y arquitectura
  riverpod: ^2.5.1
  flutter_riverpod: ^2.5.1
  get_it: ^7.6.7

  # Networking
  dio: ^5.4.1
  retrofit: ^4.1.0
  json_annotation: ^4.8.1

  # Persistencia local
  sqflite: ^2.3.3
  shared_preferences: ^2.2.3
  path: ^1.9.0

  # Notificaciones y utilerías
  flutter_local_notifications: ^17.1.0
  url_launcher: ^6.2.5
  path_provider: ^2.1.2

  # Exportación
  pdf: ^3.10.7
  printing: ^5.12.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  build_runner: ^2.4.8
  json_serializable: ^6.7.1
  retrofit_generator: ^8.1.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/fonts/